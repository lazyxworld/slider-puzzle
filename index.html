<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider Puzzle</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />

    <!--
      Slider Puzzle – polished UI implementation
      Author: Lav Dezy
      Last updated: 2025‑06‑05
    -->

    <style>
      /* ========================
         Variables & palette
      ======================== */
      :root {
        --wrapper-max: 1200px;
        --wrapper-pad: clamp(1rem, 4vw, 3rem);
        --gap: clamp(1rem, 2vw, 2rem);

        /* Board */
        --grid-size: 4;              /* JS overrides */
        --tile-gap: 2px;
        --board-edge: clamp(280px, 60vmin, 640px);

        /* Colors */
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-500: #6b7280;
        --shadow-sm: 0 2px 6px rgb(0 0 0 / 0.05);
        --shadow-lg: 0 8px 24px rgb(0 0 0 / 0.35);
      }

      /* ========================
         Base layout & type
      ======================== */
      *,*::before,*::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--gray-50);
        color: #111;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.6rem, 2.6vw, 2.5rem);
        font-weight: 700;
        text-align: center;
        margin: 0 0 1rem;
      }
      .wrapper {
        max-width: var(--wrapper-max);
        margin-inline: auto;
        padding-inline: var(--wrapper-pad);
      }

      /* ========================
         Controls toolbar
      ======================== */
      .toolbar {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: flex-end;
        background: #fff;
        padding: 0.75rem 1rem;
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        box-shadow: var(--shadow-sm);
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .toolbar select,
      .toolbar input[type="file"] {
        min-height: 2rem;
        font-size: 0.9rem;
        font-family: inherit;
      }

      /* ========================
         Main grid layout
      ======================== */
      main {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: var(--gap);
        margin-block: var(--gap);
      }
      @media (max-width: 767px) {
        main { grid-template-columns: 1fr; }
      }

      /* ----- Board area ----- */
      #boardArea {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }
      #board {
        display: grid;
        gap: var(--tile-gap);
        width: var(--board-edge);
        height: var(--board-edge);
        background: var(--gray-300);
        border-radius: 6px;
        outline: none;
        touch-action: none;
      }
      .visually-hidden { visibility: hidden; }
      .tile {
        background-size: 100% 100%;
        user-select: none;
        transition: transform 0.15s ease;
        border-radius: 4px;
        box-shadow: inset 0 0 0 1px #fff, var(--shadow-sm);
      }
      .tile:not(.blank):hover {
        transform: scale(1.03);
        z-index: 1;
      }
      .tile:focus-visible { outline: 2px solid var(--brand); }
      .blank {
        background: var(--gray-200);
        outline: 2px dashed var(--gray-300);
      }

      /* HUD */
      #hud { font-size: 0.9rem; color: var(--gray-500); }
      #hud strong { font-weight: 600; color: #000; }

      /* ----- Reference panel ----- */
      #referenceContainer { text-align: center; }
      #referenceContainer figcaption {
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--gray-500);
      }
      #referenceImg {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid var(--gray-200);
        box-shadow: var(--shadow-sm);
      }

      /* ----- Dialog ----- */
      dialog {
        border: none;
        border-radius: 12px;
        padding: 1.5rem 2rem;
        box-shadow: var(--shadow-lg);
        text-align: center;
        font-size: 1.25rem;
      }
      dialog::backdrop {
        background: rgb(0 0 0 / 0.4);
        backdrop-filter: blur(4px);
      }
      @keyframes pop {
        from { transform: scale(0.8); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
      dialog[open] { animation: pop 250ms cubic-bezier(.2,1.4,.4,1.1); }
      dialog button {
        margin-top: 1rem;
        padding: 0.45rem 1.2rem;
        font-size: 1rem;
        border: none;
        border-radius: 6px;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
      }
      dialog button:hover { background: var(--brand-dark); }

      @media (prefers-reduced-motion: reduce) {
        .tile:not(.blank):hover { transform: none; }
        dialog[open] { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>Slider Puzzle</h1>

      <!-- Toolbar -->
      <div class="toolbar" id="controls">
        <label class="control">
          Upload Image
          <input type="file" id="imageInput" accept="image/png,image/jpeg,image/jpg" />
        </label>
        <label class="control">
          Missing Tile
          <select id="blankSelect" disabled></select>
        </label>
      </div>

      <!-- Main -->
      <main>
        <!-- Board section -->
        <div id="boardArea">
          <div id="board" class="visually-hidden" tabindex="0" aria-label="Puzzle board"></div>
          <div id="hud" hidden>
            Moves ▸ <strong id="moveCount">0</strong>
            &nbsp;•&nbsp;
            Time ▸ <strong id="timer">00:00</strong>
          </div>
        </div>

        <!-- Reference section -->
        <figure id="referenceContainer" hidden>
          <figcaption>Reference</figcaption>
          <img id="referenceImg" alt="Uploaded reference" />
        </figure>
      </main>
    </div>

    <!-- Win dialog -->
    <dialog id="winDialog">
      <p>🎉 Puzzle Complete!</p>
      <button id="closeDialog">Close</button>
    </dialog>

    <script>
      (() => {
        const N = 4;
        const BOARD_PX = 480;

        /* DOM */
        const imageInput   = document.getElementById('imageInput');
        const blankSelect  = document.getElementById('blankSelect');
        const boardEl      = document.getElementById('board');
        const moveEl       = document.getElementById('moveCount');
        const timerEl      = document.getElementById('timer');
        const hudEl        = document.getElementById('hud');
        const refImg       = document.getElementById('referenceImg');
        const refWrap      = document.getElementById('referenceContainer');
        const winDialog    = document.getElementById('winDialog');
        const closeDialog  = document.getElementById('closeDialog');

        /* State */
        let goal          = [...Array(N*N).keys()];
        let board         = goal.slice();
        let blankIndex    = N*N - 1;
        let tileImages    = [];
        let moves         = 0;
        let startTime     = null;
        let timerHandle   = null;

        /* Init */
        document.documentElement.style.setProperty('--grid-size', N);

        /* Listeners */
        imageInput.addEventListener('change', onUpload);
        blankSelect.addEventListener('change', onBlankChange);
        document.addEventListener('keydown', onKey);
        closeDialog.addEventListener('click', () => winDialog.close());

        /* Upload */
        function onUpload(e) {
          const file = e.target.files[0];
          if (!file) return;
          const img = new Image();
          img.onload = () => {
            sliceImage(img);
            initGame();
            refImg.src = img.src;
            refWrap.hidden = false;
            boardEl.classList.remove('visually-hidden');
            hudEl.hidden = false;
          };
          img.src = URL.createObjectURL(file);
        }

        function sliceImage(img) {
          const size = BOARD_PX;
          const canvas = Object.assign(document.createElement('canvas'), {width: size, height: size});
          const ctx = canvas.getContext('2d');

          const scale = Math.max(size / img.width, size / img.height);
          const dx = (size - img.width * scale) / 2;
          const dy = (size - img.height * scale) / 2;
          ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);

          const tileSize = size / N;
          tileImages = [];
          for (let r=0;r<N;r++) {
            for (let c=0;c<N;c++) {
              const idx = r*N + c;
              if (idx === blankIndex) { tileImages.push(null); continue; }
              const t = Object.assign(document.createElement('canvas'), {width: tileSize, height: tileSize});
              t.getContext('2d').drawImage(canvas, c*tileSize, r*tileSize, tileSize, tileSize, 0,0,tileSize,tileSize);
              tileImages.push(t.toDataURL());
            }
          }
        }

        /* Game setup */
        function initGame() {
          goal = [...Array(N*N).keys()];
          board = goal.slice();
          moves = 0;
          moveEl.textContent = moves;
          populateBlankOptions();
          shuffle();
          render();
          boardEl.focus();
          startTimer();
        }

        function populateBlankOptions() {
          blankSelect.innerHTML = '';
          for (let i=0;i<N*N;i++) {
            const o = document.createElement('option');
            o.value = i;
            o.textContent = `Tile ${i+1}`;
            if (i===blankIndex) o.selected = true;
            blankSelect.appendChild(o);
          }
          blankSelect.disabled = false;
        }

        function startTimer() {
          clearInterval(timerHandle);
          startTime = Date.now();
          timerHandle = setInterval(() => {
            const secs = Math.floor((Date.now()-startTime)/1000);
            const mm = String(Math.floor(secs/60)).padStart(2,'0');
            const ss = String(secs%60).padStart(2,'0');
            timerEl.textContent = `${mm}:${ss}`;
          }, 1000);
        }

        /* Shuffle (always solvable) */
        function shuffle() {
          board = goal.slice();
          let blankPos = blankIndex;
          const dirs = [ {dx:0,dy:-1}, {dx:0,dy:1}, {dx:-1,dy:0}, {dx:1,dy:0} ];
          let last = null;
          const moves = N*N*25;
          for (let i=0;i<moves;i++) {
            const row = Math.floor(blankPos/N), col = blankPos%N;
            const neigh = dirs.map(({dx,dy})=>({nr:row+dy, nc:col+dx}))
              .filter(({nr,nc})=>nr>=0&&nr<N&&nc>=0&&nc<N)
              .map(({nr,nc})=>nr*N+nc)
              .filter(p=>p!==last);
            if (!neigh.length) continue;
            const target = neigh[Math.random()*neigh.length|0];
            swap(blankPos,target);
            last = blankPos;
            blankPos = target;
          }
        }

        /* Render */
        function render() {
          boardEl.innerHTML = '';
          board.forEach((tileIdx,pos)=>{
            const div = document.createElement('div');
            div.className = 'tile';
            div.style.gridColumnStart = pos%N+1;
            div.style.gridRowStart = Math.floor(pos/N)+1;
            if (tileIdx===blankIndex) {
              div.classList.add('blank');
            } else {
              div.style.backgroundImage = `url('${tileImages[tileIdx]}')`;
            }
            boardEl.appendChild(div);
          });
        }

        /* Movement */
        function onKey(e) {
          if (!e.key.startsWith('Arrow')||!tileImages.length) return;
          const blankPos = board.indexOf(blankIndex);
          const row = Math.floor(blankPos/N);
          const col = blankPos%N;
          let target=null;
          switch(e.key) {
            case 'ArrowUp':   if (row<N-1) target=(row+1)*N+col; break;
            case 'ArrowDown': if (row>0)   target=(row-1)*N+col; break;
            case 'ArrowLeft': if (col<N-1) target=row*N+col+1;   break;
            case 'ArrowRight':if (col>0)   target=row*N+col-1;   break;
          }
          if (target==null) return;
          swap(blankPos,target);
          moves++; moveEl.textContent=moves;
          render();
          if (solved()) {
            clearInterval(timerHandle);
            winDialog.showModal();
          }
        }

        function swap(i,j){ [board[i],board[j]]=[board[j],board[i]]; }
        function solved(){ return board.every((v,i)=>v===goal[i]); }

        function onBlankChange(e){
          blankIndex=+e.target.value;
          if(tileImages.length){
            const prev=tileImages.findIndex(v=>v===null);
            if(prev!==-1 && prev!==blankIndex){ tileImages[prev]=tileImages[blankIndex]; }
            tileImages[blankIndex]=null;
          }
          shuffle();
          render();
        }
      })();
    </script>
  </body>
</html>
